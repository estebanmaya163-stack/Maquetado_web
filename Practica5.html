<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>  <!-- 
    Este documento usa HTML para estructurar contenido en una página web.
    Se divide en una parte de configuración (head) y una parte visible (body).

    En el body se utiliza una lista no ordenada, lo que significa que los elementos
    se muestran con viñetas y no con números.

    La lista funciona como un contenedor que agrupa varios elementos relacionados.
    Cada elemento de la lista es independiente, pero pertenece al mismo conjunto.

    Este tipo de estructura se usa para organizar información de forma clara
    y facilitar la lectura dentro de una página web. -->
    
    <ul>
        <li>Elemento 1</li>
        <li>Elemento 2</li>
        <li>Elemento 3</li> 
    </ul>
</body>
</html>
