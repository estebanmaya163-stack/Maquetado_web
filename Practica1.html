<!DOCTYPE html> <!--Le dice al navegador que estás usando HTML5. Es obligatorio pa’ que todo funcione bien.-->

<html lang="en"> <!--La etiqueta <html> es la raíz de todo el documento. Dentro de ella va todo el contenido de la página. El atributo lang="en" indica el idioma, aunque si tu página está en español es mejor usar "es".-->

<head> <!--La etiqueta <head> contiene información que no se ve directamente en la página. Aquí se configuran cosas importantes como el título o la forma en que se muestra el contenido.-->

    <meta charset="UTF-8"> <!--La etiqueta <meta charset="UTF-8"> sirve para que los caracteres especiales como la ñ o las tildes se vean correctamente. Sin esto, algunos textos pueden aparecer mal.-->

    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--La etiqueta <meta name="viewport"> permite que la página se adapte a diferentes tamaños de pantalla, como celulares o tablets. Es clave para que el diseño sea responsive.-->

    <title>Document</title> <!--La etiqueta <title> define el nombre que aparece en la pestaña del navegador. No se ve dentro de la página, pero es importante para identificarla.-->
</head>

<body> <!--La etiqueta <body> contiene todo lo que el usuario ve en la pantalla, como textos, imágenes y botones. Es la parte visible de la página web-->
    
</body> <!--cierra el cuerpo del documento-->

</html> <!--cierra el documento HTML-->
